name: Build & Release

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (optional, e.g., v1.2.3)'
        required: false
        default: ''

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Free Disk Space
        run: |
          echo "Freeing up disk space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/local/lib/android/sdk/system-images
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            VERSION="ci-$(date +%Y.%m.%d).${GITHUB_RUN_NUMBER}"
          else
            VERSION="v$(date +%Y.%m.%d).${GITHUB_RUN_NUMBER}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

          # 提取纯版本号 (去掉v前缀)
          VERSION_NAME="${VERSION#v}"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT

          # 生成 build number (基于时间戳 YYMMDDHH，避免超过Android限制2100000000)
          BUILD_NUMBER=$(date +%y%m%d%H)
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT

          echo "Version: $VERSION"
          echo "Version Name: $VERSION_NAME"
          echo "Build Number: $BUILD_NUMBER"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Cache Android Keystore
        uses: actions/cache@v3
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build and Setup WebUI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Initialize OpenList Frontend
          echo "Initializing OpenList Frontend..."
          cd openlist-lib/scripts
          chmod +x init_web.sh
          ./init_web.sh
          cd ../..

          echo "OpenList Web installed to public/dist:"
          ls -la openlist-lib/public/dist

          # 2. Build Encrypt WebUI (Our Frontend)
          echo "Building Encrypt WebUI..."
          npm install -g pnpm@7.9.0
          cd enc-webui
          pnpm install
          npm run build

          # 3. Move Encrypt WebUI to subdirectory
          mkdir -p ../openlist-lib/public/dist/enc
          cp -r dist/* ../openlist-lib/public/dist/enc/
          echo "Encrypt WebUI built and copied to public/dist/enc:"
          ls -la ../openlist-lib/public/dist/enc/

          # Clean up node modules to save space
          rm -rf node_modules

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: openlist-lib/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init

      - name: Build Go bindings for Android
        run: |
          cd openlist-lib
          export PATH=$PATH:$(go env GOPATH)/bin
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653

          echo "Currently in openlist-lib. Checking struct:"
          ls -la

          echo "Building Android AAR..."
          gomobile bind -v \
            -target=android/arm64,android/arm \
            -androidapi=21 \
            -ldflags="-s -w" \
            -o ../android/app/libs/openlistlib.aar \
            ./openlistlib 2>&1 || {
              echo "Error: gomobile bind failed!"
              exit 1
            }

          if [ -f ../android/app/libs/openlistlib.aar ]; then
            echo "AAR file created successfully:"
            ls -la ../android/app/libs/
          else
            echo "Error: AAR file was not created!"
            exit 1
          fi

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate code
        run: |
          flutter pub run intl_utils:generate || true

          echo "Generating Pigeon code..."
          dart run pigeon \
            --input pigeons/pigeon.dart \
            --dart_out lib/generated_api.dart \
            --java_out android/app/src/main/java/com/openlist/pigeon/GeneratedApi.java \
            --java_package "com.openlist.pigeon" || echo "Pigeon generation skipped or failed"

      - name: Configure Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "Decoding keystore..."
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.jks

          echo "Creating local.properties..."
          echo "KEY_PATH=release.jks" > android/local.properties
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> android/local.properties
          echo "ALIAS_NAME=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          echo "ALIAS_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> android/local.properties

          echo "Keystore and properties configured."

      - name: Build Release APK
        run: |
          echo "Starting Flutter release build..."
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.VERSION_NAME }} \
            --build-number=${{ steps.version.outputs.BUILD_NUMBER }} 2>&1 | tee flutter_build_release.log || true

          echo "Checking release build outputs:"
          find build/app/outputs/flutter-apk -name "*.apk" || true

      - name: Build Split APKs
        run: |
          flutter build apk --split-per-abi \
            --build-name=${{ steps.version.outputs.VERSION_NAME }} \
            --build-number=${{ steps.version.outputs.BUILD_NUMBER }} 2>&1 | tee flutter_build_split.log || true

          echo "Checking split build outputs:"
          find build/app/outputs/flutter-apk -name "*.apk" || true

      - name: Rename APKs
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cd build/app/outputs/flutter-apk/

          if [ -f app-release.apk ]; then
            mv app-release.apk OpenList-Encrypt-${VERSION}.apk
          fi

          if [ -f app-arm64-v8a-release.apk ]; then
            mv app-arm64-v8a-release.apk OpenList-Encrypt-${VERSION}-arm64-v8a.apk
          fi

          if [ -f app-armeabi-v7a-release.apk ]; then
            mv app-armeabi-v7a-release.apk OpenList-Encrypt-${VERSION}-armeabi-v7a.apk
          fi

          if [ -f app-x86_64-release.apk ]; then
            mv app-x86_64-release.apk OpenList-Encrypt-${VERSION}-x86_64.apk
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.event_name != 'pull_request'
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: OpenList-Encrypt ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            build/app/outputs/flutter-apk/OpenList-Encrypt-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/OpenList-Encrypt-*.apk
          if-no-files-found: warn

  build-ios:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            VERSION="ci-$(date +%Y.%m.%d).${GITHUB_RUN_NUMBER}"
          else
            VERSION="v$(date +%Y.%m.%d).${GITHUB_RUN_NUMBER}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          VERSION_NAME="${VERSION#v}"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          BUILD_NUMBER=$(date +%y%m%d%H)
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build and Setup WebUI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Initializing OpenList Frontend..."
          cd openlist-lib/scripts
          chmod +x init_web.sh
          ./init_web.sh
          cd ../..
          echo "OpenList Web installed to public/dist:"
          ls -la openlist-lib/public/dist

          echo "Building Encrypt WebUI..."
          npm install -g pnpm@7.9.0
          cd enc-webui
          pnpm install --ignore-scripts
          npm run build
          mkdir -p ../openlist-lib/public/dist/enc
          cp -r dist/* ../openlist-lib/public/dist/enc/
          echo "Encrypt WebUI built and copied to public/dist/enc:"
          ls -la ../openlist-lib/public/dist/enc/
          rm -rf node_modules

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: openlist-lib/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init

      - name: Build Go XCFramework for iOS
        run: |
          cd openlist-lib
          export PATH=$PATH:$(go env GOPATH)/bin
          export CGO_ENABLED=1

          echo "Building iOS XCFramework..."
          gomobile bind -v \
            -target=ios \
            -ldflags="-s -w" \
            -o Openlistlib.xcframework \
            ./openlistlib 2>&1 | tee ios_build.log || {
              echo "Error: gomobile bind failed!"
              cat ios_build.log
              exit 1
            }

          echo "XCFramework created:"
          ls -la *.xcframework

          mkdir -p ../ios/Frameworks
          cp -rf *.xcframework ../ios/Frameworks/
          echo "XCFramework copied to ios/Frameworks:"
          ls -la ../ios/Frameworks/

      - name: Generate Pigeon code
        run: |
          flutter pub get
          dart run pigeon \
            --input pigeons/pigeon.dart \
            --dart_out lib/generated_api.dart \
            --swift_out ios/Runner/ \
            --swift_prefix "" || echo "Pigeon Swift generation skipped or failed"

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install || echo "pod install failed, continuing anyway"
          cd ..

      - name: Build iOS IPA (No Code Signing for sideloading)
        run: |
          PROJECT_ROOT=$(pwd)
          echo "Project root: $PROJECT_ROOT"

          # Flutter build ios from project root (do NOT cd into ios/)
          flutter build ios --release --no-codesign \
            --build-name=${{ steps.version.outputs.VERSION_NAME }} \
            --build-number=${{ steps.version.outputs.BUILD_NUMBER }} 2>&1 | tee ios_build.log || true

          # Find the .app file - check both possible locations
          APP_DIR=""
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            APP_DIR="build/ios/iphoneos"
          elif [ -d "build/ios/Release-iphoneos/Runner.app" ]; then
            APP_DIR="build/ios/Release-iphoneos"
          fi

          # Check if the app is actually substantial (not just a stub)
          if [ -n "$APP_DIR" ]; then
            APP_SIZE=$(du -sm "$APP_DIR/Runner.app" 2>/dev/null | awk '{print $1}')
            echo "Runner.app found in: $APP_DIR, size: ${APP_SIZE}MB"
            if [ "$APP_SIZE" -lt 50 ] 2>/dev/null; then
              echo "App is too small (${APP_SIZE}MB), likely a stub. Trying xcodebuild directly..."
              APP_DIR=""
            fi
          fi

          # If app not found or too small, use xcodebuild directly
          if [ -z "$APP_DIR" ]; then
            echo "Using xcodebuild directly for unsigned build..."
            xcodebuild -workspace ios/Runner.xcworkspace -scheme Runner \
              -configuration Release \
              -sdk iphoneos \
              -destination 'generic/platform=iOS' \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY="" \
              DEVELOPMENT_TEAM="" \
              CONFIGURATION_BUILD_DIR="$PROJECT_ROOT/build/ios/Release-iphoneos" \
              build 2>&1 | tee ios_xcodebuild.log
            if [ ${PIPESTATUS[0]} -ne 0 ]; then
              echo "xcodebuild failed!"
              cat ios_xcodebuild.log
              exit 1
            fi
            APP_DIR="build/ios/Release-iphoneos"
            APP_SIZE=$(du -sm "$APP_DIR/Runner.app" 2>/dev/null | awk '{print $1}')
            echo "xcodebuild Runner.app size: ${APP_SIZE}MB"
            if [ "$APP_SIZE" -lt 50 ] 2>/dev/null; then
              echo "xcodebuild also produced a tiny app (${APP_SIZE}MB)! Listing contents:"
              find "$APP_DIR/Runner.app" -type f 2>/dev/null
              exit 1
            fi
          fi

          if [ -z "$APP_DIR" ]; then
            echo "Runner.app not found anywhere. Build directory contents:"
            find build/ios -maxdepth 3 -type d 2>/dev/null | head -30
            echo "Full build log:"
            cat ios_build.log 2>/dev/null || true
            exit 1
          fi

          echo "Final Runner.app in: $APP_DIR"

          # Create IPA
          cd "$APP_DIR"
          mkdir -p Payload
          rm -rf Payload/Runner.app
          cp -r Runner.app Payload/
          IPA_NAME="OpenList-Encrypt-${{ steps.version.outputs.VERSION }}-ios.ipa"
          zip -qr "$IPA_NAME" Payload/
          cp "$IPA_NAME" "$PROJECT_ROOT/"
          cd "$PROJECT_ROOT"

          FINAL_SIZE=$(du -sm "$IPA_NAME" 2>/dev/null | awk '{print $1}')
          echo "IPA created: $IPA_NAME (${FINAL_SIZE}MB)"
          ls -lh "$IPA_NAME"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ios-ipa
          path: OpenList-Encrypt-*-ios.ipa
          if-no-files-found: warn
